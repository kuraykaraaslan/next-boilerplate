name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test]
    env:
      SYSTEM_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_test
      TENANT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      ACCESS_TOKEN_SECRET: ci_access_secret
      REFRESH_TOKEN_SECRET: ci_refresh_secret
      CSRF_SECRET: ci_csrf_secret
      NEXT_PUBLIC_APPLICATION_NAME: CI
      NEXT_PUBLIC_APPLICATION_HOST: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
